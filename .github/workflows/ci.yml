name: CI

on: [push, pull_request]

jobs:
  test:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ matrix.php == '8.0' && hashFiles('composer-php80.lock') || hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        if: matrix.php != '8.0'
        run: composer install --no-interaction --prefer-dist

      - name: Install dependencies for PHP 8.0
        if: matrix.php == '8.0'
        env:
          COMPOSER: composer-php80.json
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: PHPUnit
        run: vendor/bin/phpunit -c phpunit.xml.dist

  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer, cs2pr
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ matrix.php == '8.0' && hashFiles('composer-php80.lock') || hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        if: matrix.php != '8.0'
        run: composer install --no-interaction --prefer-dist

      - name: Install dependencies for PHP 8.0
        if: matrix.php == '8.0'
        env:
          COMPOSER: composer-php80.json
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit 1G --no-progress --error-format=checkstyle | cs2pr
        continue-on-error: true

      - name: PHP CodeSniffer
        run: vendor/bin/phpcs -s --standard=phpcs.xml.dist
